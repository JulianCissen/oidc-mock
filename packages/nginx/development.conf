error_log /dev/stdout info;

events {
    worker_connections 512;
}

http {
    # Common proxy headers
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        # Listen directive will be replaced by sed in the startup script
        listen ${PORT} ssl;
        
        # SSL configuration
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ecdh_curve X25519:prime256v1:secp384r1;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # Proxy requests to the Node.js backend for /oidc and /auth
        location /oidc/ {
            proxy_pass http://host.docker.internal:3000;
        }

        location /auth/ {
            proxy_pass http://host.docker.internal:3000;
        }

        # Serve the Vue.js frontend for all other requests
        location / {
            proxy_pass http://host.docker.internal:9000;
            # Set Host header to the original host without port
            # This is important for the dev server to work correctly
            proxy_set_header Host $host;
            
            # Add WebSocket support for dev server HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
