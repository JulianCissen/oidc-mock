# Dependabot configuration file
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# This project uses a monorepo structure with a consolidated configuration for all package.json files

version: 2
updates:
  # Consolidated configuration for all npm packages (root, backend, frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "production"
      - dependency-name: "@types/*"
    versioning-strategy: auto
    ignore:
      - dependency-name: "express"
        versions:
          - ">=5.0.0"
      - dependency-name: "@types/express"
        versions:
          - ">=5.0.0"
      - dependency-name: "quasar"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
      # Ignore updates for @types packages in root package.json
      - dependency-name: "@types/eslint"
      - dependency-name: "@types/node"
    groups:
      express-types:
        patterns:
          - "express"
          - "@types/express"
      cookie-parser-types:
        patterns:
          - "cookie-parser"
          - "@types/cookie-parser"
      oidc-provider-types:
        patterns:
          - "oidc-provider"
          - "@types/oidc-provider"
      quasar-packages:
        patterns:
          - "quasar"
          - "@quasar/*"
          - "vite-plugin-checker"
        update-types:
          - "minor"
          - "patch"
      vue-ecosystem:
        patterns:
          - "vue*"
          - "pinia"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"

  # Maintain dependencies for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
