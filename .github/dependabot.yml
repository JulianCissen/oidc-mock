# Dependabot configuration file
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain dependencies for npm packages (root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "production"
    versioning-strategy: auto
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"

  # Maintain dependencies for backend npm packages
  - package-ecosystem: "npm"
    directory: "/packages/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    allow:
      - dependency-type: "direct"
    versioning-strategy: auto
    ignore:
      - dependency-name: "express"
        versions:
          - ">=5.0.0"
    groups:
      express-types:
        patterns:
          - "express"
          - "@types/express"
      cookie-parser-types:
        patterns:
          - "cookie-parser"
          - "@types/cookie-parser"
      oidc-provider-types:
        patterns:
          - "oidc-provider"
          - "@types/oidc-provider"
    labels:
      - "dependencies"
      - "npm"
      - "backend"
    commit-message:
      prefix: "chore"

  # Maintain dependencies for frontend npm packages
  - package-ecosystem: "npm"
    directory: "/packages/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    allow:
      - dependency-type: "direct"
    versioning-strategy: auto
    rebase-strategy: "auto"
    ignore:
      - dependency-name: "quasar"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
    groups:
      quasar-packages:
        patterns:
          - "quasar"
          - "@quasar/*"
          - "vite-plugin-checker"
        update-types:
          - "minor"
          - "patch"
      vue-ecosystem:
        patterns:
          - "vue*"
          - "pinia"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    commit-message:
      prefix: "chore"

  # Maintain dependencies for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "1"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "1"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
