name: Run Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'Dockerfile'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'Dockerfile'
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      tag: 'test'

  test:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: oidc-mock-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load --input /tmp/oidc-mock-image.tar

      - name: Run production container
        run: |
          docker run -d --name oidc-mock-prod -p 8444:8444 -e PORT=8444 oidc-mock:test
          
          # Verify container is running
          docker ps | grep oidc-mock-prod
          
          # Wait for service to be available
          timeout 60s bash -c 'until curl -ks https://localhost:8444 > /dev/null; do sleep 1; done' || (docker logs oidc-mock-prod && false)
      
      - name: Run Playwright tests in container
        run: |
          # Run playwright in a container with host network
          # This allows the container to access the host's localhost where our app is running
          docker run --rm --network host \
            -v $(pwd):/work -w /work/packages/frontend \
            -e CI=true \
            mcr.microsoft.com/playwright:v1.51.1-jammy \
            /bin/bash -c "npm ci && npx playwright test"
      
      - name: Container logs (if tests fail)
        if: failure()
        run: |
          docker logs oidc-mock-prod
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 30
      
      - name: Stop container
        if: always()
        run: |
          docker stop oidc-mock-prod || true
          docker rm oidc-mock-prod || true
