name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build backend
        working-directory: ./packages/backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: ./packages/frontend
        run: |
          npm ci
          npm run build

      - name: Build Docker image
        run: |
          docker build --target production -t oidc-mock:test .
