name: Publish to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      tag: 'publish'

  publish:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: oidc-mock-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load --input /tmp/oidc-mock-image.tar

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            # Remove leading 'v' if present
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push Docker image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Tag with version and latest
          docker tag oidc-mock:publish ghcr.io/JulianCissen/oidc-mock:$VERSION
          docker tag oidc-mock:publish ghcr.io/JulianCissen/oidc-mock:latest
          
          # Push to GitHub Container Registry
          docker push ghcr.io/JulianCissen/oidc-mock:$VERSION
          docker push ghcr.io/JulianCissen/oidc-mock:latest
          
          echo "Successfully pushed ghcr.io/JulianCissen/oidc-mock:$VERSION"
          echo "Successfully pushed ghcr.io/JulianCissen/oidc-mock:latest"
